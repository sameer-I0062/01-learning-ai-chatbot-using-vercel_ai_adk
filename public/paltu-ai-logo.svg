<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="256" height="256" shape-rendering="crispEdges">
  <rect width="16" height="16" fill="#fff"/>
  <g fill="#000">
    <!-- ears -->
    <rect x="1" y="1" width="2" height="1"/><rect x="13" y="1" width="2" height="1"/>
    <rect x="1" y="2" width="3" height="1"/><rect x="12" y="2" width="3" height="1"/>
    <rect x="1" y="3" width="4" height="1"/><rect x="11" y="3" width="4" height="1"/>
    <!-- head -->
    <rect x="1" y="4" width="14" height="1"/>
    <!-- brow line (angry slant) -->
    <rect x="1" y="5" width="2" height="1"/><rect x="4" y="5" width="8" height="1"/><rect x="13" y="5" width="2" height="1"/>
    <!-- eyes -->
    <rect x="1" y="6" width="2" height="1"/><rect x="5" y="6" width="6" height="1"/><rect x="13" y="6" width="2" height="1"/>
    <rect x="1" y="7" width="14" height="1"/>
    <!-- muzzle -->
    <rect x="2" y="8" width="12" height="1"/>
    <!-- mouth + teeth -->
    <rect x="3" y="9" width="2" height="1"/><rect x="6" y="9" width="1" height="1"/>
    <rect x="8" y="9" width="1" height="1"/><rect x="10" y="9" width="3" height="1"/>
    <!-- jaw -->
    <rect x="4" y="10" width="8" height="1"/>
    <rect x="5" y="11" width="6" height="1"/>
  </g>
</svg>
